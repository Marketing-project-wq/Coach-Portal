<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>20FIT Arena · Coach Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08090B; --surface: #121418; --surface-2: #191C22; --border: #23272F;
      --lime: #D6FF3D; --text: #F3F5F7; --muted: #888F9C; --muted-2: #5A616D;
      --green: #35D07F; --amber: #FFC24B; --red: #FF5C5C;
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text); min-height: 100vh;
      font-family: 'Archivo', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .hidden { display: none !important; }
    button { font-family: inherit; cursor: pointer; }
    input { font-family: inherit; }

    /* ---------- Login ---------- */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card {
      width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 36px 30px;
    }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .brand-badge {
      width: 46px; height: 46px; border-radius: 12px; background: var(--lime); color: #08090B;
      font-weight: 900; font-size: 20px; display: flex; align-items: center; justify-content: center;
    }
    .brand-name { font-weight: 800; font-size: 15px; letter-spacing: .5px; }
    .brand-sub { color: var(--muted); font-size: 12px; font-weight: 500; }
    h1.title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 13.5px; margin-bottom: 24px; }
    label { display: block; font-size: 12.5px; color: var(--muted); margin-bottom: 7px; font-weight: 600; }
    .field { margin-bottom: 16px; }
    input[type=text], input[type=password] {
      width: 100%; background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
      border-radius: 12px; padding: 13px 14px; font-size: 14.5px; outline: none; transition: border-color .15s;
    }
    input:focus { border-color: var(--lime); }
    .btn-primary {
      width: 100%; background: var(--lime); color: #08090B; border: none; border-radius: 12px;
      padding: 14px; font-size: 15px; font-weight: 800; margin-top: 8px; transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .error-msg { color: var(--red); font-size: 13px; margin-top: 14px; text-align: center; min-height: 18px; }

    /* ---------- App ---------- */
    .topbar {
      position: sticky; top: 0; z-index: 20; background: rgba(8,9,11,.85); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border); padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .topbar .brand { margin: 0; }
    .topbar-actions { display: flex; align-items: center; gap: 10px; }
    .coach-chip {
      display: flex; align-items: center; gap: 9px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 999px; padding: 6px 6px 6px 14px; font-size: 13px; font-weight: 600;
    }
    .coach-avatar {
      width: 30px; height: 30px; border-radius: 50%; background: var(--lime); color: #08090B;
      display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px;
    }
    .icon-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      border-radius: 10px; padding: 8px 12px; font-size: 13px; font-weight: 600;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--muted-2); }

    .container { max-width: 860px; margin: 0 auto; padding: 22px 20px 60px; }
    .page-head { margin-bottom: 20px; }
    .page-head h2 { font-size: 20px; font-weight: 800; }
    .page-head p { color: var(--muted); font-size: 13.5px; margin-top: 4px; }

    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
    }
    .stat .num { font-size: 26px; font-weight: 900; line-height: 1; }
    .stat .lbl { color: var(--muted); font-size: 12px; margin-top: 8px; font-weight: 600; }
    .stat.green .num { color: var(--green); }
    .stat.amber .num { color: var(--amber); }

    .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .toolbar label { margin: 0; }
    .toolbar input[type=date] {
      background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
      border-radius: 10px; padding: 9px 11px; font-size: 13px; outline: none;
    }

    .class-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px 18px; margin-bottom: 12px; transition: border-color .15s;
    }
    .class-card:hover { border-color: var(--muted-2); }
    .cc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .cc-date { display: flex; align-items: center; gap: 12px; }
    .cc-daybox {
      width: 52px; text-align: center; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px 0;
    }
    .cc-daybox .d { font-size: 20px; font-weight: 900; line-height: 1; }
    .cc-daybox .m { font-size: 10.5px; color: var(--muted); font-weight: 700; text-transform: uppercase; margin-top: 3px; }
    .cc-info .name { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; }
    .color-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
    .cc-info .time { color: var(--muted); font-size: 13px; margin-top: 5px; }
    .cc-info .weekday { color: var(--muted-2); font-size: 12px; margin-top: 2px; }
    .cc-counts { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .badge { border-radius: 999px; padding: 5px 11px; font-size: 12px; font-weight: 700; white-space: nowrap; }
    .badge.confirmed { background: rgba(53,208,127,.12); color: var(--green); }
    .badge.pending { background: rgba(255,194,75,.12); color: var(--amber); }
    .badge.quota { background: var(--surface-2); color: var(--muted); }
    .cc-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; }
    .capacity-bar { flex: 1; height: 6px; background: var(--surface-2); border-radius: 999px; overflow: hidden; margin-right: 14px; }
    .capacity-fill { height: 100%; background: var(--lime); border-radius: 999px; }
    .btn-view {
      background: transparent; border: 1px solid var(--border); color: var(--text);
      border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 700; white-space: nowrap;
    }
    .btn-view:hover { border-color: var(--lime); color: var(--lime); }

    .empty { text-align: center; color: var(--muted); padding: 60px 20px; }
    .empty .big { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; }

    /* ---------- Modal ---------- */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(3px);
      display: flex; align-items: flex-end; justify-content: center; z-index: 50; padding: 0;
    }
    @media (min-width: 640px) { .modal-overlay { align-items: center; padding: 24px; } }
    .modal {
      background: var(--surface); border: 1px solid var(--border); width: 100%; max-width: 560px;
      max-height: 88vh; border-radius: 22px 22px 0 0; display: flex; flex-direction: column;
    }
    @media (min-width: 640px) { .modal { border-radius: 22px; } }
    .modal-head { padding: 20px 22px; border-bottom: 1px solid var(--border); }
    .modal-head .mh-title { font-size: 16px; font-weight: 800; }
    .modal-head .mh-sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .modal-close { position: absolute; top: 16px; right: 18px; background: none; border: none; color: var(--muted); font-size: 22px; }
    .modal-body { overflow-y: auto; padding: 8px 22px 22px; }
    .p-row {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 13px 0; border-bottom: 1px solid var(--border);
    }
    .p-row:last-child { border-bottom: none; }
    .p-left { min-width: 0; }
    .p-name { font-weight: 700; font-size: 14px; }
    .p-meta { color: var(--muted); font-size: 12.5px; margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
    .p-meta a { color: var(--muted); text-decoration: none; }
    .p-meta a:hover { color: var(--lime); }

    .modal-foot { padding: 16px 22px; border-top: 1px solid var(--border); }
    .link-btn { background: none; border: none; color: var(--muted); font-size: 13px; font-weight: 600; text-decoration: underline; }
    .link-btn:hover { color: var(--lime); }
    .cp-field { margin-top: 12px; }
    .cp-msg { font-size: 13px; margin-top: 10px; min-height: 16px; }
    .cp-msg.ok { color: var(--green); } .cp-msg.err { color: var(--red); }
    .spinner { text-align: center; color: var(--muted); padding: 30px; font-size: 14px; }
  </style>
</head>
<body>

  <!-- ===================== LOGIN ===================== -->
  <div id="loginScreen" class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="brand-badge">20</div>
        <div>
          <div class="brand-name">ARENA</div>
          <div class="brand-sub">Coach Portal</div>
        </div>
      </div>
      <h1 class="title">Masuk ke portal</h1>
      <p class="subtitle">Lihat jadwal kelas & peserta yang terdaftar.</p>
      <form id="loginForm" autocomplete="off">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="mis. rheza" autocapitalize="none" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">Masuk</button>
        <div class="error-msg" id="loginError"></div>
      </form>
    </div>
  </div>

  <!-- ===================== APP ===================== -->
  <div id="appScreen" class="hidden">
    <div class="topbar">
      <div class="brand">
        <div class="brand-badge">20</div>
        <div>
          <div class="brand-name">ARENA</div>
          <div class="brand-sub">Coach Portal</div>
        </div>
      </div>
      <div class="topbar-actions">
        <div class="coach-chip">
          <span id="coachName">Coach</span>
          <span class="coach-avatar" id="coachAvatar">C</span>
        </div>
        <button class="icon-btn" id="logoutBtn">Keluar</button>
      </div>
    </div>

    <div class="container">
      <div class="page-head">
        <h2>Jadwal Kelas Saya</h2>
        <p>Daftar kelas mendatang beserta jumlah peserta terdaftar.</p>
      </div>

      <div class="stats">
        <div class="stat"><div class="num" id="statClasses">0</div><div class="lbl">Kelas mendatang</div></div>
        <div class="stat green"><div class="num" id="statConfirmed">0</div><div class="lbl">Peserta confirmed</div></div>
        <div class="stat amber"><div class="num" id="statPending">0</div><div class="lbl">Menunggu bayar</div></div>
      </div>

      <div class="toolbar">
        <label for="fromDate">Dari tanggal</label>
        <input type="date" id="fromDate">
        <label for="toDate">s/d</label>
        <input type="date" id="toDate">
        <button class="icon-btn" id="refreshBtn">Terapkan</button>
        <button class="link-btn" id="changePwBtn" style="margin-left:auto;">Ganti password</button>
      </div>

      <div id="scheduleList"></div>
    </div>
  </div>

  <!-- ===================== PARTICIPANTS MODAL ===================== -->
  <div id="participantsModal" class="modal-overlay hidden">
    <div class="modal" style="position:relative;">
      <button class="modal-close" id="closeModal">&times;</button>
      <div class="modal-head">
        <div class="mh-title" id="modalTitle">Peserta</div>
        <div class="mh-sub" id="modalSub"></div>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- ===================== CHANGE PASSWORD MODAL ===================== -->
  <div id="pwModal" class="modal-overlay hidden">
    <div class="modal" style="position:relative; max-width:420px;">
      <button class="modal-close" id="closePwModal">&times;</button>
      <div class="modal-head">
        <div class="mh-title">Ganti Password</div>
        <div class="mh-sub">Minimal 6 karakter.</div>
      </div>
      <div class="modal-body">
        <form id="pwForm" autocomplete="off">
          <div class="cp-field">
            <label for="curPw">Password lama</label>
            <input type="password" id="curPw" required>
          </div>
          <div class="cp-field">
            <label for="newPw">Password baru</label>
            <input type="password" id="newPw" required>
          </div>
          <button type="submit" class="btn-primary" id="pwSubmit">Simpan</button>
          <div class="cp-msg" id="pwMsg"></div>
        </form>
      </div>
    </div>
  </div>

  <script>
    const API = '';
    const TOKEN_KEY = 'arena_coach_token';
    let coach = null;

    const $ = (id) => document.getElementById(id);
    const escapeHtml = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    ));

    function getToken() { return localStorage.getItem(TOKEN_KEY); }
    function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
    function clearToken() { localStorage.removeItem(TOKEN_KEY); }

    async function api(path, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      const token = getToken();
      if (token) headers['Authorization'] = 'Bearer ' + token;
      const res = await fetch(API + path, { ...options, headers });
      if (res.status === 401 && !path.includes('/auth/login')) { logout(); throw new Error('unauthorized'); }
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'Terjadi kesalahan.');
      return data;
    }

    const MONTHS = ['JAN', 'FEB', 'MAR', 'APR', 'MEI', 'JUN', 'JUL', 'AGU', 'SEP', 'OKT', 'NOV', 'DES'];
    const WEEKDAYS = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
    function parseDate(d) { const [y, m, day] = d.split('-').map(Number); return new Date(y, m - 1, day); }
    function fmtTime(t) { return t ? t.slice(0, 5) : ''; }

    // ---------- Login ----------
    $('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = $('loginBtn'); const err = $('loginError');
      err.textContent = ''; btn.disabled = true; btn.textContent = 'Memproses…';
      try {
        const data = await api('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ username: $('username').value.trim(), password: $('password').value }),
        });
        setToken(data.token); coach = data.coach; showApp();
      } catch (ex) {
        err.textContent = ex.message || 'Login gagal.';
      } finally {
        btn.disabled = false; btn.textContent = 'Masuk';
      }
    });

    function logout() { clearToken(); coach = null; $('appScreen').classList.add('hidden'); $('loginScreen').classList.remove('hidden'); }
    $('logoutBtn').addEventListener('click', logout);

    function showApp() {
      $('loginScreen').classList.add('hidden');
      $('appScreen').classList.remove('hidden');
      const name = coach.display_name || coach.coach_name;
      $('coachName').textContent = name;
      $('coachAvatar').textContent = (name || 'C').charAt(0).toUpperCase();
      loadSchedules();
    }

    // ---------- Schedules ----------
    async function loadSchedules() {
      const list = $('scheduleList');
      list.innerHTML = '<div class="spinner">Memuat jadwal…</div>';
      try {
        let q = [];
        if ($('fromDate').value) q.push('from=' + $('fromDate').value);
        if ($('toDate').value) q.push('to=' + $('toDate').value);
        const data = await api('/api/coach/schedules' + (q.length ? '?' + q.join('&') : ''));
        if (!$('fromDate').value && data.from) $('fromDate').value = data.from;
        renderSchedules(data.schedules);
      } catch (ex) {
        list.innerHTML = '<div class="empty"><div class="big">Gagal memuat</div>' + escapeHtml(ex.message) + '</div>';
      }
    }

    function renderSchedules(schedules) {
      let totalConfirmed = 0, totalPending = 0;
      schedules.forEach((s) => { totalConfirmed += s.confirmed_count; totalPending += s.pending_count; });
      $('statClasses').textContent = schedules.length;
      $('statConfirmed').textContent = totalConfirmed;
      $('statPending').textContent = totalPending;

      const list = $('scheduleList');
      if (!schedules.length) {
        list.innerHTML = '<div class="empty"><div class="big">Belum ada jadwal</div>Tidak ada kelas pada rentang tanggal ini.</div>';
        return;
      }
      list.innerHTML = schedules.map((s) => {
        const dt = parseDate(s.schedule_date);
        const pct = s.quota ? Math.min(100, Math.round((s.booked_total / s.quota) * 100)) : 0;
        return `
          <div class="class-card">
            <div class="cc-top">
              <div class="cc-date">
                <div class="cc-daybox">
                  <div class="d">${dt.getDate()}</div>
                  <div class="m">${MONTHS[dt.getMonth()]}</div>
                </div>
                <div class="cc-info">
                  <div class="name"><span class="color-dot" style="background:${escapeHtml(s.class_color)}"></span>${escapeHtml(s.class_name)}</div>
                  <div class="time">${fmtTime(s.start_time)} – ${fmtTime(s.end_time)} WIB</div>
                  <div class="weekday">${WEEKDAYS[dt.getDay()]}</div>
                </div>
              </div>
              <div class="cc-counts">
                <span class="badge confirmed">${s.confirmed_count} confirmed</span>
                <span class="badge pending">${s.pending_count} pending</span>
              </div>
            </div>
            <div class="cc-bottom">
              <div class="capacity-bar"><div class="capacity-fill" style="width:${pct}%"></div></div>
              <span class="badge quota" style="margin-right:12px;">${s.booked_total}/${s.quota || '∞'}</span>
              <button class="btn-view" data-id="${escapeHtml(s.id)}" data-name="${escapeHtml(s.class_name)}"
                data-date="${escapeHtml(s.schedule_date)}" data-start="${escapeHtml(s.start_time || '')}">Lihat peserta</button>
            </div>
          </div>`;
      }).join('');

      list.querySelectorAll('.btn-view').forEach((b) => {
        b.addEventListener('click', () => openParticipants(b.dataset));
      });
    }

    $('refreshBtn').addEventListener('click', loadSchedules);

    // ---------- Participants ----------
    async function openParticipants(ds) {
      const modal = $('participantsModal');
      const dt = parseDate(ds.date);
      $('modalTitle').textContent = ds.name;
      $('modalSub').textContent = `${WEEKDAYS[dt.getDay()]}, ${dt.getDate()} ${MONTHS[dt.getMonth()]} · ${fmtTime(ds.start)} WIB`;
      $('modalBody').innerHTML = '<div class="spinner">Memuat peserta…</div>';
      modal.classList.remove('hidden');
      try {
        const data = await api('/api/coach/schedules/' + encodeURIComponent(ds.id) + '/participants');
        renderParticipants(data.participants);
      } catch (ex) {
        $('modalBody').innerHTML = '<div class="empty">' + escapeHtml(ex.message) + '</div>';
      }
    }

    function statusBadge(st) {
      if (st === 'confirmed') return '<span class="badge confirmed">Confirmed</span>';
      if (st === 'pending_payment') return '<span class="badge pending">Pending</span>';
      return '<span class="badge quota">' + escapeHtml(st) + '</span>';
    }

    function renderParticipants(list) {
      if (!list || !list.length) {
        $('modalBody').innerHTML = '<div class="empty"><div class="big">Belum ada peserta</div>Belum ada yang booking kelas ini.</div>';
        return;
      }
      // Confirmed & pending first, cancelled last.
      const order = { confirmed: 0, pending_payment: 1 };
      list.sort((a, b) => (order[a.status] ?? 2) - (order[b.status] ?? 2));
      $('modalBody').innerHTML = list.map((p) => {
        const phone = p.phone ? p.phone.replace(/[^0-9+]/g, '') : '';
        return `
          <div class="p-row">
            <div class="p-left">
              <div class="p-name">${escapeHtml(p.full_name || '(tanpa nama)')}</div>
              <div class="p-meta">
                <span>${escapeHtml(p.booking_code || '')}</span>
                ${p.phone ? `<a href="https://wa.me/${escapeHtml(phone.replace(/^0/, '62'))}" target="_blank" rel="noopener">${escapeHtml(p.phone)}</a>` : ''}
              </div>
            </div>
            <div>${statusBadge(p.status)}</div>
          </div>`;
      }).join('');
    }

    $('closeModal').addEventListener('click', () => $('participantsModal').classList.add('hidden'));
    $('participantsModal').addEventListener('click', (e) => { if (e.target === $('participantsModal')) $('participantsModal').classList.add('hidden'); });

    // ---------- Change password ----------
    $('changePwBtn').addEventListener('click', () => { $('pwMsg').textContent = ''; $('pwForm').reset(); $('pwModal').classList.remove('hidden'); });
    $('closePwModal').addEventListener('click', () => $('pwModal').classList.add('hidden'));
    $('pwForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = $('pwMsg'); const btn = $('pwSubmit');
      msg.textContent = ''; msg.className = 'cp-msg'; btn.disabled = true;
      try {
        await api('/api/coach/change-password', {
          method: 'POST',
          body: JSON.stringify({ current_password: $('curPw').value, new_password: $('newPw').value }),
        });
        msg.textContent = 'Password berhasil diganti.'; msg.className = 'cp-msg ok'; $('pwForm').reset();
        setTimeout(() => $('pwModal').classList.add('hidden'), 1200);
      } catch (ex) {
        msg.textContent = ex.message; msg.className = 'cp-msg err';
      } finally { btn.disabled = false; }
    });

    // ---------- Boot ----------
    (async function boot() {
      if (getToken()) {
        try { coach = await api('/api/coach/me'); showApp(); }
        catch (_e) { logout(); }
      }
    })();
  </script>
</body>
</html>
