  [style*="--volt:#E4002B"]{ background:linear-gradient(135deg,#F2E9E6 0%,#EDEBEA 46%,#E9EEF3 100%) !important; background-attachment:fixed !important; }
  [style*="background:var(--panel)"]{ backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px); box-shadow:0 10px 30px rgba(35,25,45,.06), inset 0 1px 0 rgba(255,255,255,.55); }
  [style*="background:var(--panel2)"]{ backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); }
  [style*="Barlow Condensed"]{ text-transform:uppercase; letter-spacing:.012em; }
  header { background:rgba(255,255,255,.55) !important; backdrop-filter:blur(20px) !important; -webkit-backdrop-filter:blur(20px) !important; }
  [style*="radial-gradient(900px 600px at 12% -8%"] { display:none !important; }
  /* Sidebar: light glass surface with ink text; active nav item = red pill (design system) */
  aside { background:rgba(255,255,255,.55) !important; backdrop-filter:blur(22px) !important; -webkit-backdrop-filter:blur(22px) !important; color:#1D1D1F !important; border-right:1px solid rgba(17,17,20,.08) !important; box-shadow:0 10px 30px rgba(35,25,45,.05) !important;
    --bg:rgba(255,255,255,.5); --panel:rgba(255,255,255,.6); --panel2:rgba(255,255,255,.5); --raised:rgba(255,255,255,.6);
    --border:rgba(17,17,20,.10); --border2:rgba(17,17,20,.15);
    --text:#1D1D1F; --muted:#6E6E73; --muted2:#9A9A9E; }
  aside [style*="background:var(--panel)"]{ backdrop-filter:none !important; box-shadow:none !important; }
  aside nav button { font-family:'Barlow Condensed',system-ui,sans-serif !important; text-transform:uppercase; letter-spacing:.03em; font-weight:700 !important; font-size:15px !important; }


  html, body { margin:0; padding:0; min-height:100%; background:linear-gradient(135deg,#F2E9E6 0%,#EDEBEA 46%,#E9EEF3 100%) fixed; font-family:'Manrope',system-ui,sans-serif; }
  @media (max-width: 860px) {
    /* login: stack, hide the big hero, show only the form */
    [style*="grid-template-columns:1.05fr .95fr"] { grid-template-columns:minmax(0,1fr) !important; }
    [style*="linear-gradient(160deg,#0C0E12,#101319)"] { display:none !important; }
    [style*="justify-content:center;padding:40px"] { padding:22px !important; }
    /* app shell: stack sidebar above content */
    [style*="grid-template-columns:248px 1fr"] { grid-template-columns:minmax(0,1fr) !important; }
    aside { position:static !important; height:auto !important; max-width:100vw !important; overflow:hidden !important; border-right:0 !important; border-bottom:1px solid var(--border) !important; }
    aside nav { flex-direction:row !important; overflow-x:auto !important; overflow-y:hidden !important; gap:6px !important; padding:8px 10px !important; }
    aside nav > div { display:none !important; }
    aside nav button { white-space:nowrap !important; flex-shrink:0 !important; border-left-width:0 !important; padding:8px 12px !important; }
    main { height:auto !important; overflow:visible !important; }
    header { padding:12px 16px !important; flex-wrap:wrap !important; gap:10px !important; }
    header div:has(> span[style*="pulseDot"]) { display:none !important; }   /* hide 'Sinkron' pill */
    [style*="align-items:center;gap:14px"] { flex-wrap:wrap !important; }     /* topbar right group */
    [style*="overflow-y:auto;padding:28px"] { padding:16px !important; overflow-x:auto !important; }
    /* two-column blocks -> single column */
    [style*="grid-template-columns:1fr 1fr"],
    [style*="grid-template-columns:1.55fr 1fr"],
    [style*="grid-template-columns:1.4fr 1fr"] { grid-template-columns:minmax(0,1fr) !important; }
    /* four stat cards -> 2x2 */
    [style*="grid-template-columns:repeat(4,1fr)"] { grid-template-columns:repeat(2,minmax(0,1fr)) !important; }
    /* class-card action buttons stack full width */
    [style*="display:flex;gap:10px;margin-top:18px"] { flex-direction:column !important; }
    /* team schedule grid: keep width, scroll horizontally */
    [style*="70px repeat("] { min-width:520px; }
    [style*="border-radius:18px"]:has([style*="70px repeat("]) { overflow-x:auto !important; }
    /* per-class stats table (TGL/HARI/JAM/JENIS/PESERTA): keep columns, scroll horizontally */
    [style*="80px 90px 70px 1fr 90px"] { min-width:520px; }
    [style*="border-radius:18px"]:has([style*="80px 90px 70px 1fr 90px"]) { overflow-x:auto !important; }
  }

</style>
</head>
<body>
<div id="app"></div>
<template id="tpl"><div style="--bg:rgba(255,255,255,.55);--panel:rgba(255,255,255,.62);--panel2:rgba(255,255,255,.44);--raised:rgba(255,255,255,.55);--border:rgba(17,17,20,.10);--border2:rgba(17,17,20,.15);--text:#1D1D1F;--muted:#6E6E73;--muted2:#9A9A9E;--volt:#E4002B;--volt-dim:rgba(228,0,43,.09);--green:#1C8A4B;--amber:#C77A00;--red:#E4002B;--cyan:#0068C9;font-family:'Manrope',system-ui,sans-serif;color:var(--text);background:var(--bg);min-height:100vh;position:relative;-webkit-font-smoothing:antialiased;">

  <!-- atmosphere -->
  <div style="position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(900px 600px at 12% -8%,rgba(228,0,43,.07),transparent 60%),radial-gradient(800px 700px at 108% 110%,rgba(77,212,242,.05),transparent 55%);"></div>
  <div style="position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.4;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:46px 46px;"></div>

  <!-- ============ LOGIN ============ -->
  <sc-if value="{{ notLoggedIn }}" hint-placeholder-val="{{ true }}">
  <div style="position:relative;z-index:2;min-height:100vh;display:grid;grid-template-columns:1fr;">
    <div style="position:relative;overflow:hidden;border-right:1px solid var(--border);padding:56px 60px;display:flex;flex-direction:column;justify-content:space-between;background:linear-gradient(160deg,#0C0E12,#101319);display:none;">
      <div style="position:absolute;right:-120px;top:-60px;font-family:'Barlow Condensed';font-weight:900;font-size:420px;line-height:.8;color:rgba(228,0,43,.04);letter-spacing:-.04em;pointer-events:none;">HX</div>
      <div style="display:flex;align-items:center;gap:13px;position:relative;">
        <div style="width:40px;height:40px;border-radius:10px;background:var(--volt);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed';font-weight:900;font-size:20px;color:#ffffff;">20</div>
        <div style="font-family:'Barlow Condensed';font-weight:800;font-size:18px;letter-spacing:.02em;">20FIT<span style="color:var(--volt);"> ARENA</span></div>
      </div>
      <div style="position:relative;">
        <div style="display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border:1px solid var(--border2);border-radius:100px;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--volt);margin-bottom:26px;">Official HYROX Training Club</div>
        <h1 style="font-family:'Barlow Condensed';font-weight:900;font-size:64px;line-height:.96;letter-spacing:-.03em;margin:0 0 18px;text-transform:uppercase;">Coach<br>Portal</h1>
        <p style="color:var(--muted);font-size:16px;line-height:1.6;max-width:380px;margin:0;">Satu tempat untuk jadwal, peserta, absensi, dan rotation coach — tersinkron langsung dengan Admin Hub Arena.</p>
      </div>
      <div style="display:flex;gap:36px;position:relative;">
        <div><div style="font-family:'Barlow Condensed';font-weight:800;font-size:26px;color:var(--volt);">8</div><div style="font-size:12px;color:var(--muted);letter-spacing:.04em;">Coach Aktif</div></div>
        <div><div style="font-family:'Barlow Condensed';font-weight:800;font-size:26px;color:var(--volt);">1</div><div style="font-size:12px;color:var(--muted);letter-spacing:.04em;">Lokasi · Menteng</div></div>
        <div><div style="font-family:'Barlow Condensed';font-weight:800;font-size:26px;color:var(--volt);">HYROX</div><div style="font-size:12px;color:var(--muted);letter-spacing:.04em;">Complete · Foundation</div></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:center;padding:40px;">
      <div style="width:100%;max-width:380px;">
        <div style="font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Selamat datang kembali</div>
        <h2 style="font-family:'Barlow Condensed';font-weight:800;font-size:30px;margin:0 0 30px;letter-spacing:-.01em;">Masuk ke Akun Anda</h2>
        <label style="display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px;">Name</label>
        <div style="display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--border2);border-radius:12px;padding:0 14px;margin-bottom:18px;">
          <span style="color:var(--muted2);font-size:15px;">@</span>
          <input id="loginEmail" placeholder="username atau email" value="" style="flex:1;background:transparent;border:0;outline:0;color:var(--text);font-family:'Manrope';font-size:15px;padding:14px 0;">
        </div>
        <label style="display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px;">Password</label>
        <div style="display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--border2);border-radius:12px;padding:0 14px;margin-bottom:26px;">
          <span style="color:var(--muted2);font-size:15px;">••</span>
          <input id="loginPassword" type="password" placeholder="password" value="" style="flex:1;background:transparent;border:0;outline:0;color:var(--text);font-family:'JetBrains Mono';font-size:15px;padding:14px 0;letter-spacing:.1em;">
        </div>
        <button onclick="{{ login }}" style="width:100%;background:var(--volt);color:#ffffff;border:0;border-radius:12px;padding:16px;font-family:'Barlow Condensed';font-weight:800;font-size:16px;letter-spacing:.02em;text-transform:uppercase;cursor:pointer;transition:transform .12s,box-shadow .2s;box-shadow:0 10px 30px -10px rgba(228,0,43,.5);" style-hover="transform:translateY(-2px);box-shadow:0 16px 40px -12px rgba(228,0,43,.6);">Masuk ke Portal</button>
        <p style="text-align:center;color:var(--muted2);font-size:13px;margin-top:20px;line-height:1.6;">Lupa password? Password dibuat &amp; direset oleh <span style="color:var(--muted);">Admin</span>. Hubungi Admin untuk bantuan.</p>
      </div>
    </div>
  </div>
  </sc-if>

  <!-- ============ APP SHELL ============ -->
  <sc-if value="{{ loggedIn }}" hint-placeholder-val="{{ true }}">
  <div style="position:relative;z-index:2;display:grid;grid-template-columns:248px 1fr;min-height:100vh;">

    <!-- SIDEBAR -->
    <aside style="border-right:1px solid var(--border);background:rgba(13,15,19,.7);backdrop-filter:blur(8px);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;">
      <div style="padding:22px 20px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--border);">
        
        <div style="font-family:'Barlow Condensed';font-weight:800;font-size:22px;letter-spacing:.03em;line-height:1.05;">Coach Workspace</div>
      </div>

      <nav style="flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:3px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:.16em;color:var(--muted2);padding:8px 10px 6px;">COACH</div>
        <button onclick="{{ goDash }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.dash.bg }};color:{{ nav.dash.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.dash.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Schedule</button>
        <button onclick="{{ goEmail }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.email.bg }};color:{{ nav.email.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.email.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Feedback</button><button onclick="{{ goReviews }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.reviews.bg }};color:{{ nav.reviews.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.reviews.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Review</button><button onclick="{{ goLeaderboard }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.leaderboard.bg }};color:{{ nav.leaderboard.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.leaderboard.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Leaderboard</button><sc-if value="{{ showCoachNav }}"><button onclick="{{ goMembers }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.members.bg }};color:{{ nav.members.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.members.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Peserta</button></sc-if><sc-if value="{{ showCoachNav }}"><button onclick="{{ goMonthly }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.monthly.bg }};color:{{ nav.monthly.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.monthly.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Monitoring</button></sc-if><sc-if value="{{ showCoachNav }}"><button onclick="{{ goSubReview }}" style="display:flex;align-items:center;justify-content:space-between;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.subrev.bg }};color:{{ nav.subrev.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.subrev.bar }};transition:background .15s;" style-hover="background:var(--panel2);"><span>Rotation</span><sc-if value="{{ hasIncoming }}"><span style="background:var(--amber);color:#ffffff;font-size:11px;font-weight:800;padding:1px 7px;border-radius:100px;font-family:'Barlow Condensed';">{{ incomingCount }}</span></sc-if></button></sc-if>

        <sc-if value="{{ isHC }}" hint-placeholder-val="{{ true }}">
        <div style="font-size:10px;font-weight:700;letter-spacing:.16em;color:var(--muted2);padding:14px 10px 6px;">HEAD COACH</div>
        <button onclick="{{ goOverview }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.overview.bg }};color:{{ nav.overview.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.overview.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Overview</button>
        <button onclick="{{ goSchedule }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.schedule.bg }};color:{{ nav.schedule.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.schedule.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Schedule</button>
        <button onclick="{{ goSubReview }}" style="display:flex;align-items:center;justify-content:space-between;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.subrev.bg }};color:{{ nav.subrev.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.subrev.bar }};transition:background .15s;" style-hover="background:var(--panel2);"><span>Rotation</span><span style="background:var(--amber);color:#ffffff;font-size:11px;font-weight:800;padding:1px 7px;border-radius:100px;font-family:'Barlow Condensed';">{{ pendingCount }}</span></button>
        <button onclick="{{ goMonitor }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.monitor.bg }};color:{{ nav.monitor.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.monitor.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Monitoring Coach</button>
        <button onclick="{{ goReports }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.reports.bg }};color:{{ nav.reports.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.reports.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Laporan</button>
        </sc-if>

        <sc-if value="{{ isAdmin }}" hint-placeholder-val="{{ true }}">
        <div style="font-size:10px;font-weight:700;letter-spacing:.16em;color:var(--muted2);padding:14px 10px 6px;display:flex;align-items:center;gap:7px;">ADMIN <span style="width:5px;height:5px;border-radius:50%;background:var(--volt);"></span></div>
        <button onclick="{{ goAccounts }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.accounts.bg }};color:{{ nav.accounts.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.accounts.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Akun Coach</button>
        <button onclick="{{ goTemplates }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.templates.bg }};color:{{ nav.templates.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.templates.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Template Feedback</button>
        <button onclick="{{ goSettings }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.settings.bg }};color:{{ nav.settings.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.settings.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Pengaturan</button>
        <button onclick="{{ goPerms }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.perms.bg }};color:{{ nav.perms.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.perms.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Hak Akses</button>
        </sc-if>
      </nav>

      <div style="padding:14px;border-top:1px solid var(--border);">
        <div style="display:flex;align-items:center;gap:11px;padding:8px;border-radius:11px;background:var(--panel);">
          <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--volt),#B0001F);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed';font-weight:800;font-size:14px;color:#ffffff;">{{ user.initials }}</div>
          <div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:13px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ user.name }}</div><div style="font-size:11px;color:var(--muted);">{{ user.role }}</div></div>
          <button onclick="{{ logout }}" title="Keluar" style="background:transparent;border:0;color:var(--muted2);cursor:pointer;font-size:16px;padding:4px;" style-hover="color:var(--red);">⏻</button>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main style="min-width:0;display:flex;flex-direction:column;height:100vh;overflow:hidden;">
      <!-- TOPBAR -->
      <header style="display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:1px solid var(--border);background:rgba(8,9,11,.6);backdrop-filter:blur(6px);">
        <div>
          <div style="font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.04em;">{{ pageKicker }}</div>
          <h1 style="font-family:'Barlow Condensed';font-weight:800;font-size:22px;margin:2px 0 0;letter-spacing:-.01em;">{{ pageTitle }}</h1>
        </div>
        <div style="display:flex;align-items:center;gap:14px;">
          <div style="display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);padding:8px 13px;border:1px solid var(--border);border-radius:100px;"><span style="width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulseDot 1.8s infinite;"></span>Sinkron dengan Admin Hub</div>
          <div style="display:flex;background:var(--panel);border:1px solid var(--border);border-radius:100px;padding:3px;">
            <button onclick="{{ setRoleCoach }}" style="border:0;cursor:pointer;font-family:'Manrope';font-weight:700;font-size:12.5px;padding:7px 14px;border-radius:100px;background:{{ rseg.coach.bg }};color:{{ rseg.coach.fg }};transition:background-color .15s,color .15s;">Coach</button>

        <!-- ===== HEAD COACH OVERVIEW ===== -->
        <sc-if value="{{ s.overview }}" hint-placeholder-val="{{ true }}">
        <div style="max-width:1140px;margin:0 auto;">
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;">

              <sc-if value="{{ noPending }}" hint-placeholder-val="{{ false }}"><div style="padding:30px 20px;text-align:center;color:var(--muted2);font-size:13px;">Tidak ada permintaan menunggu ✓</div></sc-if>

          </div>

        <!-- ===== JADWAL TIM ===== -->
        <sc-if value="{{ s.schedule }}" hint-placeholder-val="{{ true }}">

                <div style="text-align:center;"><div style="width:46px;height:46px;border-radius:50%;background:var(--volt-dim);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed';font-weight:800;font-size:15px;color:var(--volt);margin:0 auto;">{{ p.toIni }}</div><div style="font-size:12px;color:var(--muted);margin-top:6px;">{{ p.to }}</div></div>
                <div style="padding-left:8px;border-left:1px solid var(--border);"><div style="font-weight:700;font-size:15px;">{{ p.cls }}</div><div style="font-size:13px;color:var(--muted);">{{ p.time }}</div><div style="font-size:13px;color:var(--muted);margin-top:2px;">Alasan: <span style="color:var(--text);">{{ p.reason }}</span></div></div>

        <!-- ===== MONITORING LIST ===== -->
