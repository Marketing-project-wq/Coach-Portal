  [style*="--volt:#E4002B"]{ background:linear-gradient(135deg,#F2E9E6 0%,#EDEBEA 46%,#E9EEF3 100%) !important; background-attachment:fixed !important; }
  /* Cards sit over a smooth gradient, so blurring behind each one costs GPU on every
     re-render for ~no visible gain. Keep the frosted look on the sidebar + header only;
     give inner cards a slightly more opaque fill + soft shadow so they still read as glass. */
  [style*="background:var(--panel)"]{ background:rgba(255,255,255,.72) !important; box-shadow:0 10px 30px rgba(35,25,45,.06), inset 0 1px 0 rgba(255,255,255,.55); }
  [style*="background:var(--panel2)"]{ background:rgba(255,255,255,.6) !important; }
  [style*="Barlow Condensed"]{ text-transform:uppercase; letter-spacing:.012em; }
  header { background:rgba(255,255,255,.55) !important; backdrop-filter:blur(20px) !important; -webkit-backdrop-filter:blur(20px) !important; }
  [style*="radial-gradient(900px 600px at 12% -8%"] { display:none !important; }
  /* Sidebar: dark black->gray surface with white text; active nav item = red pill */
  aside { background:linear-gradient(180deg,#171719 0%,#2b2b30 100%) !important; backdrop-filter:blur(22px) !important; -webkit-backdrop-filter:blur(22px) !important; color:#FFFFFF !important; border-right:1px solid rgba(255,255,255,.08) !important; box-shadow:0 10px 30px rgba(0,0,0,.28) !important;
    --bg:rgba(255,255,255,.06); --panel:rgba(255,255,255,.07); --panel2:rgba(255,255,255,.10); --raised:rgba(255,255,255,.08);
    --border:rgba(255,255,255,.10); --border2:rgba(255,255,255,.18);
    --text:#FFFFFF; --muted:rgba(255,255,255,.66); --muted2:rgba(255,255,255,.46); }
  aside [style*="background:var(--panel)"]{ background:rgba(255,255,255,.06) !important; backdrop-filter:none !important; box-shadow:none !important; }
  aside nav button { font-family:'Barlow Condensed',system-ui,sans-serif !important; text-transform:uppercase; letter-spacing:.03em; font-weight:700 !important; font-size:15px !important; }
  /* Active nav item stays red on hover so its white label doesn't vanish.
     During hover the JS handler normalizes #E4002B -> rgb(228, 0, 43), so match that. */
  aside nav button[style*="rgb(228, 0, 43)"]:hover,
  aside nav button[style*="#E4002B"]:hover { background:#C80028 !important; color:#FFFFFF !important; }


  html, body { margin:0; padding:0; min-height:100%; background:linear-gradient(135deg,#F2E9E6 0%,#EDEBEA 46%,#E9EEF3 100%) fixed; font-family:'Manrope',system-ui,sans-serif; }
  .hamburger { display:none; }
  .menu-backdrop { display:none; }
  @media (max-width: 860px) {
    /* login: stack, hide the big hero, show only the form */
    [style*="grid-template-columns:1.05fr .95fr"] { grid-template-columns:minmax(0,1fr) !important; }
    [style*="linear-gradient(160deg,#0C0E12,#101319)"] { display:none !important; }
    [style*="justify-content:center;padding:40px"] { padding:22px !important; }
    /* app shell: stack sidebar above content */
    [style*="grid-template-columns:248px 1fr"] { grid-template-columns:minmax(0,1fr) !important; }
    /* sidebar becomes a left slide-in drawer, toggled by the hamburger */
    aside { position:fixed !important; left:0 !important; top:0 !important; height:100vh !important; width:270px !important; max-width:84vw !important; transform:translateX(-100%); transition:transform .22s ease; z-index:90 !important; overflow-y:auto !important; border-right:1px solid var(--border) !important; border-bottom:0 !important; box-shadow:0 20px 60px rgba(20,15,30,.18); }
    [data-menu="open"] aside { transform:translateX(0) !important; }
    [data-menu="open"] .menu-backdrop { display:block !important; position:fixed !important; inset:0 !important; background:rgba(20,15,30,.42); z-index:85; }
    .hamburger { display:flex !important; }
    main { height:auto !important; overflow:visible !important; }
    header { padding:12px 16px !important; flex-wrap:wrap !important; gap:10px !important; }
    header div:has(> span[style*="pulseDot"]) { display:none !important; }   /* hide sync pill */
    [style*="align-items:center;gap:14px"] { flex-wrap:wrap !important; }     /* topbar right group */
    [style*="overflow-y:auto;padding:28px"] { padding:16px !important; overflow-x:auto !important; }
    /* two-column blocks -> single column */
    [style*="grid-template-columns:1fr 1fr"],
    [style*="grid-template-columns:1.55fr 1fr"],
    [style*="grid-template-columns:1.4fr 1fr"] { grid-template-columns:minmax(0,1fr) !important; }
    /* four stat cards -> 2x2 */
    [style*="grid-template-columns:repeat(4,1fr)"] { grid-template-columns:repeat(2,minmax(0,1fr)) !important; }
    /* class-card action buttons stack full width */
    [style*="display:flex;gap:10px;margin-top:18px"] { flex-direction:column !important; }
    /* team schedule grid: keep width, scroll horizontally */
    [style*="70px repeat("] { min-width:520px; }
    [style*="border-radius:18px"]:has([style*="70px repeat("]) { overflow-x:auto !important; }
    /* per-class stats table (DATE/DAY/TIME/TYPE/PAX): keep columns, scroll horizontally */
    [style*="80px 90px 70px 1fr 90px"] { min-width:520px; }
    [style*="border-radius:18px"]:has([style*="80px 90px 70px 1fr 90px"]) { overflow-x:auto !important; }
  }

</style>

<body>
<div id="app"></div>
<template id="tpl"><div style="--bg:rgba(255,255,255,.55);--panel:rgba(255,255,255,.62);--panel2:rgba(255,255,255,.44);--raised:rgba(255,255,255,.55);--border:rgba(17,17,20,.10);--border2:rgba(17,17,20,.15);--text:#1D1D1F;--muted:#6E6E73;--muted2:#9A9A9E;--volt:#E4002B;--volt-dim:rgba(228,0,43,.09);--green:#1C8A4B;--amber:#C77A00;--red:#E4002B;--cyan:#0068C9;font-family:'Manrope',system-ui,sans-serif;color:var(--text);background:var(--bg);min-height:100vh;position:relative;-webkit-font-smoothing:antialiased;">

  <!-- atmosphere -->
  <div style="position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(900px 600px at 12% -8%,rgba(228,0,43,.07),transparent 60%),radial-gradient(800px 700px at 108% 110%,rgba(77,212,242,.05),transparent 55%);"></div>
  <div style="position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.4;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:46px 46px;"></div>

  <!-- ============ LOGIN ============ -->
  <sc-if value="{{ notLoggedIn }}" hint-placeholder-val="{{ true }}">
  <div style="position:relative;z-index:2;min-height:100vh;display:grid;grid-template-columns:1fr;">
    <div style="position:relative;overflow:hidden;border-right:1px solid var(--border);padding:56px 60px;display:flex;flex-direction:column;justify-content:space-between;background:linear-gradient(160deg,#0C0E12,#101319);display:none;">
      <div style="position:absolute;right:-120px;top:-60px;font-family:'Barlow Condensed';font-weight:900;font-size:420px;line-height:.8;color:rgba(228,0,43,.04);letter-spacing:-.04em;pointer-events:none;">HX</div>
      <div style="display:flex;align-items:center;gap:13px;position:relative;">
        <div style="width:40px;height:40px;border-radius:10px;background:var(--volt);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed';font-weight:900;font-size:20px;color:#ffffff;">20</div>
        <div style="font-family:'Barlow Condensed';font-weight:800;font-size:18px;letter-spacing:.02em;">20FIT<span style="color:var(--volt);"> ARENA</span></div>
      </div>
      <div style="position:relative;">
        <div style="display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border:1px solid var(--border2);border-radius:100px;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--volt);margin-bottom:26px;">Official HYROX Training Club</div>
        <h1 style="font-family:'Barlow Condensed';font-weight:900;font-size:64px;line-height:.96;letter-spacing:-.03em;margin:0 0 18px;text-transform:uppercase;">Coach<br>Portal</h1>
        <p style="color:var(--muted);font-size:16px;line-height:1.6;max-width:380px;margin:0;">One place for schedules, participants, attendance, and coach substitutions — synced directly with Admin Hub Arena.</p>
      </div>
      <div style="display:flex;gap:36px;position:relative;">
        <div><div style="font-family:'Barlow Condensed';font-weight:800;font-size:26px;color:var(--volt);">8</div><div style="font-size:12px;color:var(--muted);letter-spacing:.04em;">Active Coaches</div></div>
        <div><div style="font-family:'Barlow Condensed';font-weight:800;font-size:26px;color:var(--volt);">1</div><div style="font-size:12px;color:var(--muted);letter-spacing:.04em;">Location · Menteng</div></div>
        <div><div style="font-family:'Barlow Condensed';font-weight:800;font-size:26px;color:var(--volt);">HYROX</div><div style="font-size:12px;color:var(--muted);letter-spacing:.04em;">Complete · Foundation</div></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:center;padding:40px;">
      <div style="width:100%;max-width:380px;">
        <div style="display:flex;justify-content:flex-end;gap:6px;margin-bottom:20px;">
          <button onclick="{{ setLangEN }}" style="background:{{ langEnBg }};color:{{ langEnFg }};border:1px solid var(--border2);border-radius:8px;padding:6px 14px;font-family:'Manrope';font-weight:700;font-size:12.5px;cursor:pointer;">EN</button>
          <button onclick="{{ setLangID }}" style="background:{{ langIdBg }};color:{{ langIdFg }};border:1px solid var(--border2);border-radius:8px;padding:6px 14px;font-family:'Manrope';font-weight:700;font-size:12.5px;cursor:pointer;">ID</button>
        </div>
        <div style="font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Welcome back</div>
        <h2 style="font-family:'Barlow Condensed';font-weight:800;font-size:30px;margin:0 0 30px;letter-spacing:-.01em;">Sign in to your account</h2>
        <label style="display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px;">Name</label>
        <div style="display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--border2);border-radius:12px;padding:0 14px;margin-bottom:18px;">
          <span style="color:var(--muted2);font-size:15px;">@</span>
          <input id="loginEmail" placeholder="username or email" value="" style="flex:1;background:transparent;border:0;outline:0;color:var(--text);font-family:'Manrope';font-size:15px;padding:14px 0;">
        </div>
        <label style="display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px;">Password</label>
        <div style="display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--border2);border-radius:12px;padding:0 14px;margin-bottom:26px;">
          <span style="color:var(--muted2);font-size:15px;">••</span>
          <input id="loginPassword" type="password" placeholder="password" value="" style="flex:1;background:transparent;border:0;outline:0;color:var(--text);font-family:'JetBrains Mono';font-size:15px;padding:14px 0;letter-spacing:.1em;">
        </div>
        <button onclick="{{ login }}" style="width:100%;background:var(--volt);color:#ffffff;border:0;border-radius:12px;padding:16px;font-family:'Barlow Condensed';font-weight:800;font-size:16px;letter-spacing:.02em;text-transform:uppercase;cursor:pointer;transition:transform .12s,box-shadow .2s;box-shadow:0 10px 30px -10px rgba(228,0,43,.5);" style-hover="transform:translateY(-2px);box-shadow:0 16px 40px -12px rgba(228,0,43,.6);">Login</button>
        <p style="text-align:center;color:var(--muted2);font-size:13px;margin-top:20px;line-height:1.6;">Forgot your password? Passwords are created &amp; reset by <span style="color:var(--muted);">Admin</span>. Contact your Admin for help.</p>
      </div>
    </div>
  </div>
  </sc-if>

  <!-- ============ APP SHELL ============ -->
  <sc-if value="{{ loggedIn }}" hint-placeholder-val="{{ true }}">
  <div data-menu="{{ menuState }}" style="position:relative;z-index:2;display:grid;grid-template-columns:248px 1fr;min-height:100vh;"><div class="menu-backdrop" onclick="{{ closeMenu }}"></div>

    <!-- SIDEBAR -->
    <aside style="border-right:1px solid var(--border);background:rgba(13,15,19,.7);backdrop-filter:blur(8px);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;">
      <div style="padding:22px 20px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--border);">
        
        <div style="flex:1;text-align:center;min-width:0;"><div style="display:flex;justify-content:center;"><div style="display:flex;align-items:center;gap:6px;font-family:'Barlow Condensed';font-weight:900;font-size:19px;letter-spacing:.01em;line-height:1;margin-bottom:7px;"><span style="color:var(--text);display:inline-flex;align-items:center;">2<span style="display:inline-flex;width:.66em;height:.66em;border:.15em solid var(--text);box-sizing:border-box;border-radius:50%;position:relative;margin:0 .04em;"><span style="position:absolute;inset:22%;background:#E4002B;border-radius:50%;"></span></span>FIT</span><span style="color:var(--muted2);font-weight:400;">|</span><span style="color:#E4002B;">ARENA</span></div></div><div style="font-family:'Barlow Condensed';font-weight:800;font-size:14px;letter-spacing:.02em;line-height:1.05;color:var(--muted);text-align:center;">Coach Workspace</div></div>
      </div>

      <nav data-navscroll style="flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:3px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:.16em;color:var(--muted2);padding:8px 10px 6px;">COACH</div>
        <button onclick="{{ goDash }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.dash.bg }};color:{{ nav.dash.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.dash.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Schedule</button><sc-if value="{{ showVenueNav }}"><button onclick="{{ goVenue }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.venue.bg }};color:{{ nav.venue.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.venue.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Venue Booking</button><sc-if value="{{ showMenuNav }}"><button onclick="{{ goMenu }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.menu.bg }};color:{{ nav.menu.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.menu.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Class Menu</button></sc-if></sc-if>
        <sc-if value="{{ showReview }}"><button onclick="{{ goReviews }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.reviews.bg }};color:{{ nav.reviews.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.reviews.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Review</button></sc-if><sc-if value="{{ showLeaderboard }}"><button onclick="{{ goLeaderboard }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.leaderboard.bg }};color:{{ nav.leaderboard.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.leaderboard.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Leaderboard</button></sc-if><sc-if value="{{ showCoachNav }}"><button onclick="{{ goMonthly }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.monthly.bg }};color:{{ nav.monthly.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.monthly.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Monitoring</button></sc-if><sc-if value="{{ showCoachNav }}"><button onclick="{{ goSubReview }}" style="display:flex;align-items:center;justify-content:space-between;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.subrev.bg }};color:{{ nav.subrev.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.subrev.bar }};transition:background .15s;" style-hover="background:var(--panel2);"><span>Coverage</span><sc-if value="{{ hasIncoming }}"><span style="background:var(--amber);color:#ffffff;font-size:11px;font-weight:800;padding:1px 7px;border-radius:100px;font-family:'Barlow Condensed';">{{ incomingCount }}</span></sc-if></button></sc-if>

        <sc-if value="{{ isHC }}" hint-placeholder-val="{{ true }}">
        <div style="font-size:10px;font-weight:700;letter-spacing:.16em;color:var(--muted2);padding:14px 10px 6px;">HEAD COACH</div>
                <button onclick="{{ goSchedule }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.schedule.bg }};color:{{ nav.schedule.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.schedule.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Team Schedule</button><button onclick="{{ goVenueAssign }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.venueassign.bg }};color:{{ nav.venueassign.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.venueassign.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Assign Venue</button>
        <button onclick="{{ goSubReview }}" style="display:flex;align-items:center;justify-content:space-between;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.subrev.bg }};color:{{ nav.subrev.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.subrev.bar }};transition:background .15s;" style-hover="background:var(--panel2);"><span>Coverage</span><span style="background:var(--amber);color:#ffffff;font-size:11px;font-weight:800;padding:1px 7px;border-radius:100px;font-family:'Barlow Condensed';">{{ pendingCount }}</span></button>
        <button onclick="{{ goMonitor }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.monitor.bg }};color:{{ nav.monitor.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.monitor.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Coach Monitoring</button>
        <button onclick="{{ goReports }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.reports.bg }};color:{{ nav.reports.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.reports.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Reports</button><sc-if value="{{ showMembers }}"><button onclick="{{ goMembers }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.members.bg }};color:{{ nav.members.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.members.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Participants</button></sc-if>
        </sc-if>

        <sc-if value="{{ isAdmin }}" hint-placeholder-val="{{ true }}">
        <div style="font-size:10px;font-weight:700;letter-spacing:.16em;color:var(--muted2);padding:14px 10px 6px;display:flex;align-items:center;gap:7px;">ADMIN <span style="width:5px;height:5px;border-radius:50%;background:var(--volt);"></span></div>
        <button onclick="{{ goAccounts }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.accounts.bg }};color:{{ nav.accounts.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.accounts.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Account</button>
        <button onclick="{{ goSettings }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.settings.bg }};color:{{ nav.settings.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.settings.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Settings</button>
        <button onclick="{{ goPerms }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:{{ nav.perms.bg }};color:{{ nav.perms.fg }};font-family:'Manrope';font-weight:600;font-size:14px;text-align:left;border-left:3px solid {{ nav.perms.bar }};transition:background .15s;" style-hover="background:var(--panel2);">Permissions</button>
        </sc-if>
      </nav>

      <div style="padding:14px;border-top:1px solid var(--border);">
        <div style="display:flex;align-items:center;gap:11px;padding:4px 6px 12px;">

14em;color:var(--muted);margin:6px 0 14px;">SCHEDULE · {{ jadwalLabel }}</div><sc-if value="{{ noClasses }}"><div style="background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:34px 24px;text-align:center;color:var(--muted);">No classes on this date.</div></sc-if>

              <div style="display:flex;gap:8px;margin-top:10px;align-items:center;">

            </sc-for>
          </div>
          </sc-if>

        <sc-if value="{{ s.monthly }}"><div style="max-width:980px;margin:0 auto;"><div style="font-family:'Barlow Condensed';font-weight:800;font-size:22px;margin-bottom:20px;">Class Monitoring</div><div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:16px;"><div style="background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:16px 18px;"><div style="font-size:12px;color:var(--muted);">Classes This Month</div><div style="font-family:'Barlow Condensed';font-weight:900;font-size:30px;color:var(--volt);">{{ mKelasBulan }}</div></div><div style="background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:16px 18px;"><div style="font-size:12px;color:var(--muted);">Participants This Month</div><div style="font-family:'Barlow Condensed';font-weight:900;font-size:30px;color:#0068C9;">{{ mPesertaBulan }}</div></div><div style="background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:16px 18px;"><div style="font-size:12px;color:var(--muted);">Participants since July</div><div style="font-family:'Barlow Condensed';font-weight:900;font-size:30px;color:#0068C9;">{{ mPesertaTahun }}</div></div></div><div style="background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:22px;"><div style="font-weight:800;font-family:'Barlow Condensed';font-size:16px;margin-bottom:4px;">Pax &amp; Classes per Month · since July {{ monthlyYear }}</div><div style="font-size:12px;color:var(--muted);margin-bottom:22px;">Bar height = number of <b style="color:#0068C9;">pax</b>. The number under each month name = number of <b style="color:var(--volt);">classes</b>.</div><div style="display:grid;grid-auto-flow:column;grid-auto-columns:minmax(0,1fr);gap:10px;align-items:end;"><sc-for list="{{ monthly }}" as="m"><div style="text-align:center;"><div style="font-size:13px;font-weight:800;font-family:'Barlow Condensed';margin-bottom:6px;color:{{ m.pesertaCol }};">{{ m.pesertaLabel }}</div><div style="height:{{ m.h }}px;min-height:3px;background:{{ m.bar }};border-radius:6px;"></div><div style="font-size:11px;color:{{ m.monthCol }};margin-top:8px;font-weight:700;">{{ m.month }}</div><div style="font-size:10.5px;color:var(--muted2);margin-top:2px;">{{ m.kelasLabel }}</div></div></sc-for></div></div></div></sc-if>

00;font-size:12.5px;cursor:pointer;">Copy Link</button></div><sc-if value="{{ reviewFilterOn }}"><div style="margin-bottom:16px;"><div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:7px;">Filter by coach</div><select onchange="{{ setReviewCoach }}" style="width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:11px;padding:11px;color:var(--text);font-size:13.5px;cursor:pointer;"><option value="">All coaches</option><sc-for list="{{ reviewCoachOpts }}" as="o"><option value="{{ o.name }}" selected="{{ o.picked }}">{{ o.label }}</option></sc-for></select></div></sc-if><sc-for list="{{ reviews }}" as="rv"><div style="background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:12px;"><div style="display:flex;align-items:center;justify-content:space-between;gap:10px;"><div style="font-weight:700;font-size:14px;">{{ rv.name }} <span style="color:var(--muted2);font-weight:400;font-size:12px;">&#183; {{ rv.cls }}{{ rv.coachSuffix }}</span></div><div style="color:var(--amber);font-size:15px;letter-spacing:2px;">{{ rv.stars }}</div></div><sc-if value="{{ rv.hasComment }}"><div style="color:var(--text);font-size:13.5px;margin-top:8px;">{{ rv.comment }}</div></sc-if><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;"><sc-for list="{{ rv.tags }}" as="t"><span style="background:var(--volt-dim);color:var(--volt);border-radius:100px;padding:3px 11px;font-size:11.5px;font-weight:700;">{{ t }}</span></sc-for></div><div style="color:var(--muted2);font-size:11.5px;margin-top:9px;">{{ rv.date }}</div></div></sc-for><sc-if value="{{ noReviews }}"><div style="background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:40px;text-align:center;color:var(--muted);">No reviews yet. Share the link above with your participants &#10024;</div></sc-if></div></sc-if>

        <p style="color:var(--text);font-size:14.5px;line-height:1.55;margin:0 0 18px;font-weight:600;">Your coaching session has been recorded in Coach Portal.</p>

  </sc-if>

  <!-- ===== RESET MODAL ===== -->
  <sc-if value="{{ showReset }}" hint-placeholder-val="{{ false }}">
  <div style="position:fixed;inset:0;z-index:50;background:rgba(4,5,7,.72);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:24px;" onclick="{{ closeReset }}">

      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px;">
        <h2 style="font-family:'Barlow Condensed';font-weight:800;font-size:20px;margin:0;">Reset Password</h2>
        <button onclick="{{ closeReset }}" style="background:var(--raised);border:1px solid var(--border2);color:var(--muted);border-radius:9px;width:30px;height:30px;flex-shrink:0;cursor:pointer;font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;" style-hover="border-color:var(--red);color:var(--red);">✕</button>

      <div style="display:flex;gap:11px;">
        <button onclick="{{ closeReset }}" style="flex:1;background:transparent;border:1px solid var(--border2);color:var(--muted);border-radius:11px;padding:12px;font-weight:700;font-size:14px;cursor:pointer;transition:border-color .15s,color .15s;" style-hover="border-color:var(--muted);color:var(--text);">Cancel</button>
        <button onclick="{{ confirmReset }}" style="flex:1.3;background:var(--cyan);border:0;color:#ffffff;border-radius:11px;padding:12px;font-family:'Barlow Condensed';font-weight:800;font-size:14px;cursor:pointer;">Set Password</button>

  </sc-if>

  <sc-if value="{{ showMenuModal }}" hint-placeholder-val="{{ false }}"><div data-modalscroll style="position:fixed;inset:0;z-index:55;background:rgba(4,5,7,.72);backdrop-filter:blur(4px);display:flex;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto;" onclick="{{ closeMenuModal }}"><div onclick="{{ stopProp }}" style="background:var(--panel2);border:1px solid var(--border2);border-radius:22px;padding:24px;max-width:660px;width:100%;margin:auto;"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px;"><h2 style="font-family:'Barlow Condensed';font-weight:800;font-size:21px;margin:0;">{{ menuModalTitle }}</h2><button onclick="{{ closeMenuModal }}" style="background:var(--raised);border:1px solid var(--border2);color:var(--muted);border-radius:9px;width:30px;height:30px;flex-shrink:0;cursor:pointer;font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;">✕</button></div><label style="display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:6px;">Menu Name</label><input data-mb="title" value="{{ mbTitle }}" placeholder="e.g. HYROX Complete — Full Simulation" style="background:var(--bg);border:1px solid var(--border2);border-radius:9px;padding:9px 10px;color:var(--text);font-family:'Manrope';font-size:13px;outline:0;box-sizing:border-box;width:100%;margin-bottom:12px;"><label style="display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:6px;">Class Type <span style="color:var(--muted2);font-weight:400;">(optional)</span></label><select data-mb="category" style="background:var(--bg);border:1px solid var(--border2);border-radius:9px;padding:9px 10px;color:var(--text);font-family:'Manrope';font-size:13px;outline:0;box-sizing:border-box;width:100%;margin-bottom:12px;cursor:pointer;"><option value="">— select class type —</option><sc-for list="{{ mbCategoryOpts }}" as="o"><option value="{{ o.name }}" selected="{{ o.picked }}">{{ o.name }}</option></sc-for></select><label style="display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:6px;">Notes / manual add-on — before blocks <span style="color:var(--muted2);font-weight:400;">(optional)</span></label><textarea data-mb="note" rows="2" placeholder="e.g. 10 min amrap / 2 min rest — or type extra exercises by hand" style="background:var(--bg);border:1px solid var(--border2);border-radius:9px;padding:9px 10px;color:var(--text);font-family:'Manrope';font-size:13px;outline:0;box-sizing:border-box;width:100%;resize:vertical;line-height:1.5;">{{ mbNote }}</textarea><div style="border-top:1px solid var(--border);margin:16px 0 4px;"></div><sc-for list="{{ mbBlocks }}" as="blk"><div style="background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:12px 13px;margin-bottom:8px;background:var(--panel);"><div style="display:flex;align-items:center;gap:9px;margin-bottom:10px;"><input data-mb="{{ blk.labelAttr }}" value="{{ blk.label }}" placeholder="Block (A, B, Wu…)" style="background:var(--bg);border:1px solid var(--border2);border-radius:9px;padding:9px 10px;color:var(--text);font-family:'Manrope';font-size:13px;outline:0;box-sizing:border-box;width:150px;font-weight:700;"><div style="flex:1;"></div><button onclick="{{ blk.removeBlock }}" title="Delete block" style="background:transparent;border:1px solid var(--border2);color:var(--muted);border-radius:8px;width:34px;height:34px;flex-shrink:0;cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;">✕</button></div><sc-for list="{{ blk.items }}" as="it"><div style="display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin-bottom:7px;"><input data-mb="{{ it.nameAttr }}" value="{{ it.name }}" placeholder="exercise (e.g. Wallballs)" style="background:var(--bg);border:1px solid var(--border2);border-radius:9px;padding:9px 10px;color:var(--text);font-family:'Manrope';font-size:13px;outline:0;box-sizing:border-box;flex:1;min-width:130px;"><input data-mb="{{ it.amountAttr }}" value="{{ it.amount }}" placeholder="qty" inputmode="decimal" style="background:var(--bg);border:1px solid var(--border2);border-radius:9px;padding:9px 10px;color:var(--text);font-family:'Manrope';font-size:13px;outline:0;box-sizing:border-box;width:62px;text-align:center;"><select data-mb="{{ it.unitAttr }}" style="background:var(--bg);border:1px solid var(--border2);border-radius:9px;padding:9px 10px;color:var(--text);font-family:'Manrope';font-size:13px;outline:0;box-sizing:border-box;width:84px;cursor:pointer;"><sc-for list="{{ it.unitOpts }}" as="o"><option value="{{ o.v }}" selected="{{ o.picked }}">{{ o.l }}</option></sc-for></select><input data-mb="{{ it.weightAttr }}" value="{{ it.weight }}" placeholder="kg (opt)" style="background:var(--bg);border:1px solid var(--border2);border-radius:9px;padding:9px 10px;color:var(--text);font-family:'Manrope';font-size:13px;outline:0;box-sizing:border-box;width:80px;"><button onclick="{{ it.remove }}" style="background:transparent;border:1px solid var(--border2);color:var(--muted);border-radius:8px;width:32px;height:34px;flex-shrink:0;cursor:pointer;font-size:13px;line-height:1;">✕</button></div></sc-for><div style="display:flex;gap:8px;margin-top:2px;flex-wrap:wrap;"><button onclick="{{ blk.addItem }}" style="background:var(--raised);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:7px 13px;font-weight:700;font-size:12px;cursor:pointer;">+ Add Menu</button><button onclick="{{ blk.addBlockAfter }}" style="background:var(--volt-dim);border:1px solid var(--volt);color:var(--volt);border-radius:8px;padding:7px 13px;font-weight:700;font-size:12px;cursor:pointer;">+ Add Block</button></div></div></sc-for><div style="display:flex;gap:11px;margin-top:16px;"><button onclick="{{ closeMenuModal }}" style="flex:1;background:transparent;border:1px solid var(--border2);color:var(--muted);border-radius:11px;padding:13px;font-weight:700;font-size:14px;cursor:pointer;">Cancel</button><button onclick="{{ saveMenuBuilder }}" style="flex:1.5;background:var(--volt);border:0;color:#ffffff;border-radius:11px;padding:13px;font-family:'Barlow Condensed';font-weight:800;font-size:14px;cursor:pointer;text-transform:uppercase;letter-spacing:.02em;">Save Menu</button></div></div></div></sc-if>

  <!-- ===== TOAST ===== -->
  <sc-if value="{{ hasToast }}" hint-placeholder-val="{{ false }}">
