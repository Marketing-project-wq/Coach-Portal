<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tutorial Coach Internal — 20FIT Arena</title><style>
:root{ --ground:#f3ede8; --panel:#ffffff; --ink:#191417; --muted:#6c666a; --faint:#9a9498; --line:#e7e0da; --line2:#f0eae5; --red:#E4002B; --red2:#b8001f; --good:#1C8A4B; --warn:#B0710A; --acc:var(--red); --shadow:0 30px 70px -34px rgba(50,20,25,.55); --shadow2:0 6px 18px -6px rgba(228,0,43,.5); }
@media (prefers-color-scheme:dark){ :root{ --ground:#120f11; --panel:#1e1a1c; --ink:#f3efec; --muted:#a8a2a4; --faint:#7c7679; --line:#332d30; --line2:#282326; --red:#ff2d55; --red2:#e01f45; --good:#3ec27e; --warn:#e0a341; --shadow:0 30px 74px -30px rgba(0,0,0,.82); --shadow2:0 6px 18px -6px rgba(255,45,85,.5);} }
:root[data-theme="dark"]{ --ground:#120f11; --panel:#1e1a1c; --ink:#f3efec; --muted:#a8a2a4; --faint:#7c7679; --line:#332d30; --line2:#282326; --red:#ff2d55; --red2:#e01f45; --good:#3ec27e; --warn:#e0a341; --shadow:0 30px 74px -30px rgba(0,0,0,.82); --shadow2:0 6px 18px -6px rgba(255,45,85,.5); }
:root[data-theme="light"]{ --ground:#f3ede8; --panel:#ffffff; --ink:#191417; --muted:#6c666a; --faint:#9a9498; --line:#e7e0da; --line2:#f0eae5; --red:#E4002B; --red2:#b8001f; --good:#1C8A4B; --warn:#B0710A; --shadow:0 30px 70px -34px rgba(50,20,25,.55); --shadow2:0 6px 18px -6px rgba(228,0,43,.5); }
*{ box-sizing:border-box; } html,body{ margin:0; height:100%; }
body{ background:radial-gradient(1200px 640px at 50% -10%, color-mix(in srgb,var(--red) 8%, var(--ground)), var(--ground) 62%); color:var(--ink); font-family:'Hanken Grotesk',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif; -webkit-font-smoothing:antialiased; line-height:1.5; }
.app{ min-height:100%; display:flex; flex-direction:column; }
.bar{ display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 20px 0; }
.brand{ display:flex; align-items:center; gap:10px; }
.brand picture{ display:block; line-height:0; }
.brand .blogo{ height:40px; width:auto; display:block; }
.brand .wm{ display:none; font-family:ui-sans-serif,system-ui,'Segoe UI',Arial,sans-serif; font-weight:900; font-size:18px; letter-spacing:-.02em; }
.brand .wm i{ color:var(--red); font-style:normal; }
.brand.nologo picture{ display:none; }
.brand.nologo .wm{ display:inline-flex; }
.brand .tag2{ font-size:13px; font-weight:800; letter-spacing:.14em; color:var(--faint); padding-left:12px; border-left:1.5px solid var(--line); }
.counter{ font-size:12.5px; color:var(--muted); font-weight:800; font-variant-numeric:tabular-nums; }
.prog{ height:5px; background:var(--line); border-radius:100px; overflow:hidden; margin:12px 20px 0; }
.prog span{ display:block; height:100%; width:0; background:linear-gradient(90deg,var(--red2),var(--red)); border-radius:100px; transition:width .4s cubic-bezier(.4,0,.2,1); }
.stage{ flex:1; display:flex; align-items:center; justify-content:center; padding:20px 18px 8px; }
.scroller{ max-width:100%; display:flex; justify-content:center; }
#screen{ position:relative; display:inline-block; line-height:0; border-radius:16px; box-shadow:var(--shadow); animation:pop .34s cubic-bezier(.2,.7,.2,1); }
@keyframes pop{ from{opacity:0;transform:translateY(10px) scale(.99);} to{opacity:1;transform:none;} }
#shot{ display:block; max-width:100%; max-height:calc(100vh - 250px); width:auto; height:auto; border-radius:16px; border:1px solid var(--line); }
#hot{ position:absolute; border:2.5px solid var(--red); border-radius:12px; background:color-mix(in srgb,var(--red) 9%, transparent); cursor:pointer; z-index:5; animation:pulse 1.5s ease-in-out infinite; }
#hot:hover{ background:color-mix(in srgb,var(--red) 16%, transparent); }
@keyframes pulse{ 0%,100%{ box-shadow:0 0 0 0 color-mix(in srgb,var(--red) 55%,transparent), 0 0 0 1px color-mix(in srgb,var(--red) 40%,transparent) inset; } 50%{ box-shadow:0 0 0 10px color-mix(in srgb,var(--red) 0%,transparent), 0 0 0 1px color-mix(in srgb,var(--red) 40%,transparent) inset; } }
.ktap{ position:absolute; left:50%; transform:translateX(-50%); background:var(--red); color:#fff; font-size:11.5px; font-weight:800; padding:4px 10px; border-radius:100px; white-space:nowrap; box-shadow:var(--shadow2); line-height:1.2; letter-spacing:.01em; pointer-events:none; animation:bob 1.5s ease-in-out infinite; }
.ktap.above{ bottom:calc(100% + 8px); } .ktap.below{ top:calc(100% + 8px); }
@keyframes bob{ 0%,100%{ transform:translateX(-50%) translateY(0);} 50%{ transform:translateX(-50%) translateY(-3px);} }
.banner{ max-width:640px; margin:0 auto; padding:2px 20px 26px; width:100%; }
.banner.top{ padding:14px 20px 4px; }
.botbar{ max-width:640px; margin:0 auto; padding:4px 20px 22px; width:100%; }
.bcard{ display:flex; flex-direction:column; align-items:flex-start; gap:11px; background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:16px 18px; box-shadow:0 14px 34px -24px rgba(40,20,25,.5); }
.num{ flex-shrink:0; width:42px; height:42px; border-radius:13px; background:linear-gradient(140deg,var(--red),var(--red2)); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:18px; font-variant-numeric:tabular-nums; box-shadow:var(--shadow2); }
.btext h2{ font-family:ui-sans-serif,system-ui,'Segoe UI',Arial,sans-serif; font-weight:800; letter-spacing:-.01em; font-size:17px; margin:2px 0 6px; display:flex; align-items:center; gap:9px; }
.btext h2 .sno{ flex-shrink:0; width:26px; height:26px; border-radius:50%; background:linear-gradient(140deg,var(--red),var(--red2)); color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:13.5px; font-weight:900; font-variant-numeric:tabular-nums; box-shadow:var(--shadow2); }
.btext p{ margin:0; font-size:14px; color:var(--muted); } .btext .hi{ color:var(--ink); font-weight:700; }
.hint{ text-align:center; font-size:12.5px; color:var(--faint); margin:12px 0 0; font-weight:600; }
.hint b{ color:var(--red); }
.foot{ display:flex; align-items:center; justify-content:center; gap:18px; margin-top:10px; }
.lnk{ background:none; border:0; color:var(--faint); font:inherit; font-size:12.5px; font-weight:700; cursor:pointer; padding:6px 8px; border-radius:8px; }
.lnk:hover{ color:var(--ink); background:var(--line2); } .lnk:disabled{ opacity:.3; cursor:default; }
/* start + done cards */
.hero{ max-width:560px; margin:0 auto; text-align:center; padding:20px; animation:pop .34s cubic-bezier(.2,.7,.2,1); }
.hero .badge{ width:74px; height:74px; border-radius:22px; background:linear-gradient(140deg,var(--red),var(--red2)); color:#fff; font-size:34px; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; box-shadow:var(--shadow2); }
.hero .chip{ display:inline-flex; align-items:center; gap:8px; font-size:11.5px; font-weight:800; letter-spacing:.05em; padding:6px 13px; border-radius:100px; margin-bottom:16px; }
.hero .chip .dot{ width:8px; height:8px; border-radius:50%; }
.hero h1{ font-family:ui-sans-serif,system-ui,'Segoe UI',Arial,sans-serif; font-weight:900; letter-spacing:-.025em; font-size:clamp(24px,5vw,32px); margin:0 0 10px; line-height:1.1; }
.hero p{ color:var(--muted); font-size:15px; margin:0 auto 24px; max-width:440px; }
.hero .go{ border:0; border-radius:14px; padding:15px 30px; font-weight:800; font-size:15.5px; cursor:pointer; font-family:inherit; background:linear-gradient(140deg,var(--red),var(--red2)); color:#fff; box-shadow:var(--shadow2); transition:transform .12s ease, box-shadow .18s; }
.hero .go:hover{ transform:translateY(-2px); box-shadow:0 12px 26px -8px color-mix(in srgb,var(--red) 70%,transparent); }
.hero .go.ghost{ background:var(--panel); color:var(--ink); border:1px solid var(--line); box-shadow:none; }
.hero .recap{ text-align:left; background:var(--panel); border:1px dashed var(--line); border-radius:15px; padding:18px 20px; margin:0 0 24px; }
.hero .recap ul{ margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:9px; }
.hero .recap li{ font-size:13.5px; color:var(--muted); padding-left:26px; position:relative; }
.hero .recap li::before{ content:"✓"; position:absolute; left:2px; top:0; color:var(--good); font-weight:900; }
.gorow{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.toast{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px); background:var(--ink); color:var(--ground); font-size:13px; font-weight:700; padding:10px 18px; border-radius:100px; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; z-index:20; box-shadow:0 12px 30px -12px rgba(0,0,0,.5); }
.toast.on{ opacity:1; transform:translateX(-50%) translateY(0); }
:focus-visible{ outline:2px solid var(--red); outline-offset:3px; }
@media (max-width:640px){ .brand .tag2{ display:none; } .bcard{ padding:14px; }
  .scroller{ overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:16px; justify-content:flex-start; }
  #screen{ box-shadow:none; }
  #shot{ max-height:calc(100vh - 300px); }
  #shot.wide{ min-width:640px; max-height:none; }
}
</style></head><body><div class="app" id="app"></div><div class="toast" id="tst"></div><script>

  var prog=Math.round(i/(STEPS.length-1)*100);
  var head='<div class="bar"><div class="brand"><picture><source srcset="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" media="(prefers-color-scheme: dark)"><img class="blogo" src="https://media.20fit.id/wp-content/uploads/2026/05/Logo-20fit.png" alt="20FIT" onerror="__noLogo(this)"></picture><span class="wm">20<i>\u2022</i>FIT</span><span class="tag2">COACH WORKSPACE</span></div>'
    +'<span class="counter">'+(s.img?('Langkah '+stepIndexOf(i)+' / '+TOTAL):(i===0?'Mulai':'Selesai'))+'</span></div>'
    +'<div class="prog"><span style="width:'+prog+'%"></span></div>';
  if(s.type==='start'){
    app.innerHTML=head+'<div class="stage"><div class="hero">'
      +'<div class="badge">\u25B6</div>'
      +(CHIP?('<span class="chip" style="'+CHIP.style+'"><span class="dot" style="background:'+CHIP.dot+'"></span>'+CHIP.label+'</span>'):'')
      +'<h1>'+H1+'</h1><p>'+INTRO+'</p>'
      +'<button class="go" id="go">Mulai \u2192</button></div></div>';
    document.getElementById('go').onclick=next;
    return;
  }
  if(s.type==='done'){
    var items=RECAP.map(function(r){return '<li>'+r+'</li>';}).join('');
    app.innerHTML=head+'<div class="stage"><div class="hero">'
      +'<div class="badge">\uD83C\uDF89</div>'
      +'<h1>Selesai! Kamu siap.</h1><p>Kamu sudah menjalani seluruh alur Coach Workspace — dari login sampai selesai kelas.</p>'
      +'<div class="recap"><ul>'+items+'</ul></div>'
      +'<div class="gorow"><button class="go ghost" id="again">\u21BA Ulangi</button></div></div></div>';
    document.getElementById('again').onclick=function(){i=0;render();};
    return;
  }
  // interactive step
  var lx=(s.spot[0]/s.W*100), ly=(s.spot[1]/s.H*100), lw=(s.spot[2]/s.W*100), lh=(s.spot[3]/s.H*100);
  var above = (ly+lh)>88;
  var wide = (s.W/s.H) > 1.3;
  app.innerHTML=head
    +'<div class="banner top"><div class="bcard">'
      +'<div class="btext"><h2><span class="sno">'+stepIndexOf(i)+'</span>'+s.t+'</h2><p>'+s.d+'</p></div></div></div>'
    +'<div class="stage"><div class="scroller" id="scroller"><div id="screen">'
      +'<img id="shot" class="'+(wide?'wide':'')+'" alt="" src="'+IMG[s.img]+'">'
      +'<div id="hot" role="button" tabindex="0" aria-label="'+s.t+'" style="left:'+lx+'%;top:'+ly+'%;width:'+lw+'%;height:'+lh+'%;">'
        +'<span class="ktap '+(above?'above':'below')+'">\uD83D\uDC46 Ketuk</span>'
      +'</div>'
    +'</div></div></div>'
    +'<div class="botbar"><div class="foot"><button class="lnk" id="back" '+(i<=1?'disabled':'')+'>\u2039 Kembali</button>'
        +'<button class="lnk" id="skip">Lewati tutorial</button></div></div>';
  var hot=document.getElementById('hot');
  hot.onclick=function(e){e.stopPropagation();next();};
  hot.onkeydown=function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();next();}};
  document.getElementById('screen').onclick=function(){toast('Ketuk area yang menyala \uD83D\uDC46');var h=document.getElementById('hot');h.style.animation='none';void h.offsetWidth;h.style.animation='';};
  document.getElementById('back').onclick=function(){if(i>1){i--;render();}};
  document.getElementById('skip').onclick=function(){i=STEPS.length-1;render();};
  // On phones the wide screenshot scrolls horizontally — center it on the glowing spot.
  requestAnimationFrame(function(){
    var sc=document.getElementById('scroller'), sh=document.getElementById('shot');
    if(sc && sh && sc.scrollWidth>sc.clientWidth+4){
      var cx=(s.spot[0]+s.spot[2]/2)/s.W*sh.offsetWidth;
      sc.scrollLeft=Math.max(0, cx - sc.clientWidth/2);
    }
  });
}
function next(){ if(i<STEPS.length-1){i++;render();} }
document.addEventListener('keydown',function(e){ var s=STEPS[i]; if((e.key==='ArrowRight')&&s.type!=='done'){ if(s.type==='start'||s.img)next(); } if(e.key==='ArrowLeft'&&i>1&&STEPS[i].img){i--;render();} });
render();
</script></body></html>
